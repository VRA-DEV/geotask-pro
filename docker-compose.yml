services:
  db:
    image: postgres:15
    container_name: geotask_pro_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: viniciosreis
      POSTGRES_DB: geotask-pro-v2
    ports:
      - "5433:5432"
    volumes:
      - geotask_pro_pgdata:/var/lib/postgresql/data

volumes:
  geotask_pro_pgdata:
